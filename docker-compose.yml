version: '3.8'

services:
  acdrip-plus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acdrip-plus
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - DATABASE_URL=sqlite:///./acdrip_plus.db
      - JWT_SECRET_KEY=change-this-to-a-strong-random-secret-in-production
    volumes:
      - acdrip_data:/app/reports_output
      - acdrip_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  acdrip_data:
  acdrip_db:
